server:
  port: 8091
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      connection-init-sql: SET timezone = 'UTC'
  liquibase:
    enabled: true
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        timezone:
            default_storage: NORMALIZE_UTC
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
    consumer:
      auto-offset-reset: earliest
folio:
  exchange:
    enabled: true
  tenant:
    validation:
      enabled: false
  system-user:
    enabled: false
    username: mod-innreach
    password: Mod-innreach-1-0-0
    lastname: System
    permissionsFilePath: permissions/test-permissions.csv
management:
  endpoints:
    access:
      default: none
logging:
  exchange:
    enabled: true
  level:
    org.springframework.web: debug
    org.springframework.transaction.interceptor: trace
    org.folio.innreach.external: debug
    org.folio.innreach.client.customization: debug
inn-reach:
  jwt-access-token:
    cache:
      ttl: 500
      max-size: 100
okapi.url: ${OKAPI_URL:http://localhost:8080}
INNREACH_TENANTS: testing|testing1|testing4
MAX_FAILURE: 0
contribution:
  scheduler:
    fixed-delay: 30000
    initial-delay: 1000
  retry-attempts: 1
  fetch-limit: 50
  tenant-cache:
    ttl: 120
